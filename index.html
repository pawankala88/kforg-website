<!DOCTYPE html>
<html>
<head>
<title>KFO COMMAND</title>

<style>
body {
    margin:0;
    font-family: monospace;
    background:black;
    color:#00ff88;
}

/* RADAR */
.radar {
    width:200px;
    height:200px;
    border:2px solid #00ff88;
    border-radius:50%;
    margin:auto;
    position:relative;
}
.radar::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px solid #00ff88;
    animation:pulse 2s infinite;
}
@keyframes pulse {
    from {transform:scale(1); opacity:1;}
    to {transform:scale(1.5); opacity:0;}
}

/* MAP */
.map {
    height:200px;
    border:1px solid #00ff88;
    margin:20px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGIN */
.login {
    text-align:center;
    margin-top:20px;
}
input {
    padding:10px;
    margin:5px;
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
}

/* BUTTON */
button {
    padding:10px 20px;
    background:#00ff88;
    border:none;
}

/* HIDDEN PANEL */
.secret {
    display:none;
    text-align:center;
    margin-top:20px;
}
</style>

</head>

<body>

<h1 style="text-align:center;">KFO COMMAND</h1>

<!-- RADAR -->
<div class="radar"></div>

<!-- MAP -->
<div class="map">
🛰️ TRACKING AREA ACTIVE
</div>

<!-- LOGIN -->
<div class="login">
<h3>SECURE ACCESS</h3>
<input type="password" id="pass" placeholder="Enter Code">
<br>
<button onclick="login()">Enter</button>
</div>

<!-- SECRET -->
<div class="secret" id="secret">
<h2>ACCESS GRANTED ✅</h2>
<p>Welcome to KFO Internal System</p>

<a href="https://instagram.com/thekalaforceofficial__" target="_blank">
Follow Instagram
</a>
</div>

<script>
function login(){
    let p = document.getElementById("pass").value;
    if(p === "kfo123"){
        document.getElementById("secret").style.display="block";
        beep();
    } else {
        alert("ACCESS DENIED ❌");
    }
}

/* SOUND */
function beep(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.type="sine";
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
}
</script>

</body>
</html>
